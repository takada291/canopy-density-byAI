<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI林冠</title>
    
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
    <meta name="theme-color" content="#2c3e50">

    <script async src="https://www.googletagmanager.com/gtag/js?id=G-WXBP6CPKLP"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());

      // ここも測定IDに書き換えます
      gtag('config', 'G-WXBP6CPKLP');
    </script>
    
    <style>
        body {
            font-family: sans-serif;
            margin: 0;
            padding: 0;
            background-color: #000;
            color: #fff;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* --- スタート画面 --- */
        #startScreen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: #f0f4f8;
            color: #333;
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }
        .app-title {
            font-size: 2rem;
            color: #2c3e50;
            margin-bottom: 40px;
            font-weight: bold;
        }
        .mode-btn {
            width: 250px;
            padding: 20px;
            margin: 10px;
            font-size: 1.2rem;
            font-weight: bold;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: transform 0.1s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .btn-camera {
            background-color: #27ae60;
            color: white;
        }
        .btn-file {
            background-color: #3498db;
            color: white;
        }
        .mode-btn:active {
            transform: scale(0.95);
        }

        /* --- カメラ画面 --- */
        .camera-container {
            position: relative;
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            background: #000;
            display: none; /* 初期は非表示 */
        }
        #video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
        }
        
        /* 水準器 */
        .level-overlay {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 200px; height: 200px;
            border-radius: 50%;
            border: 2px dashed rgba(255, 255, 255, 0.5);
            z-index: 10;
            pointer-events: none;
            display: flex; justify-content: center; align-items: center;
        }
        .crosshair { position: absolute; width: 100%; height: 100%; }
        .crosshair::before { content: ''; position: absolute; top: 50%; left: 0; right: 0; height: 1px; background: rgba(255,255,255,0.5); }
        .crosshair::after { content: ''; position: absolute; left: 50%; top: 0; bottom: 0; width: 1px; background: rgba(255,255,255,0.5); }
        
        .target-circle {
            width: 60px; height: 60px;
            border: 3px solid rgba(255, 255, 255, 0.8);
            border-radius: 50%;
            z-index: 11;
            transition: all 0.2s;
        }
        .target-circle.ok {
            border-color: #2ecc71;
            background-color: rgba(46, 204, 113, 0.3);
            box-shadow: 0 0 15px #2ecc71;
        }
        .bubble {
            position: absolute;
            width: 30px; height: 30px;
            background-color: #e74c3c;
            border-radius: 50%;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            z-index: 12;
            transition: transform 0.1s linear;
        }

        .sensor-btn {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            z-index: 20;
            background: rgba(0, 0, 0, 0.6); color: #fff; border: 1px solid #fff;
            padding: 8px 16px; border-radius: 20px; display: none;
        }

        /* シャッターエリア */
        .controls-area {
            height: 120px;
            background: #222;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 20;
            display: none; /* 初期は非表示 */
        }
        .shutter-btn {
            width: 70px; height: 70px;
            background-color: #fff; border-radius: 50%; border: 5px solid #ccc;
            cursor: pointer; transition: transform 0.1s;
        }
        .shutter-btn:active { transform: scale(0.95); background-color: #ddd; }
        
        /* 戻るボタン（カメラモード時） */
        .back-btn {
            position: absolute;
            bottom: 20px; left: 20px;
            color: white; font-size: 0.9rem; text-decoration: underline; cursor: pointer;
        }


        /* --- 結果＆編集画面 --- */
        #resultLayer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #f0f4f8;
            color: #333;
            z-index: 50;
            display: none;
            flex-direction: column;
            overflow-y: auto;
            padding-bottom: 30px;
        }
        .result-header {
            padding: 15px;
            background: #fff;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            display: flex; justify-content: space-between; align-items: center;
        }
        .home-btn {
            background: #95a5a6; color: white; border: none;
            padding: 8px 15px; border-radius: 5px; font-weight: bold; cursor: pointer;
        }
        .result-content { padding: 20px; text-align: center; }
        .result-canvas { max-width: 100%; border: 1px solid #ccc; margin-bottom: 20px; }
        
        .slider-box { background: #fff; padding: 15px; border-radius: 10px; margin-top: 10px; }
        input[type=range] { width: 100%; margin: 15px 0; }
        .score-box { display: flex; justify-content: space-around; margin-top: 10px; }
        .main-score { font-size: 2rem; color: #27ae60; font-weight: bold; }
        .sub-score { font-size: 1rem; color: #7f8c8d; }

        /* GPSボタン用スタイル */
        .gps-section {
            margin-top: 20px;
            border-top: 1px dashed #ccc;
            padding-top: 15px;
        }
        .gps-btn {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .gps-btn:active { transform: scale(0.98); }
        .gps-result {
            margin-top: 10px;
            font-family: monospace;
            font-size: 1rem;
            color: #2c3e50;
            background: #ecf0f1;
            padding: 10px;
            border-radius: 5px;
            display: none; /* 初期は非表示 */
        }

        /* ファイル選択用（隠し要素） */
        #fileInput { display: none; }
    </style>
</head>
<body>

    <div id="startScreen">
        <div class="app-title">🌲 AI林冠 v2.2</div>
        
        <button class="mode-btn btn-camera" onclick="startCameraMode()">
            <span>📷</span> カメラで撮影
        </button>
        
        <button class="mode-btn btn-file" onclick="startFileMode()">
            <span>📂</span> 写真を選択
        </button>
        
        <div style="margin-top:20px; font-size:0.8rem; color:#7f8c8d;">
            ※PCや既存画像は「写真を選択」へ
        </div>
    </div>
    
    <input type="file" id="fileInput" accept="image/*">


    <div class="camera-container" id="cameraContainer">
        <video id="video" autoplay playsinline muted></video>
        
        <button id="sensorBtn" class="sensor-btn" onclick="requestSensorPermission()">📡 水準器ON</button>

        <div class="level-overlay">
            <div class="crosshair"></div>
            <div class="target-circle" id="targetCircle"></div>
            <div class="bubble" id="bubble"></div>
        </div>
    </div>

    <div class="controls-area" id="controlsArea">
        <div class="back-btn" onclick="goHome()">🏠 戻る</div>
        <button class="shutter-btn" id="shutterBtn"></button>
    </div>


    <div id="resultLayer">
        <div class="result-header">
            <h2 style="margin:0; font-size:1.2rem;">🌲 解析結果</h2>
            <button class="home-btn" onclick="goHome()">🏠 最初に戻る</button>
        </div>
        
        <div class="result-content">
            <canvas id="canvas" class="result-canvas"></canvas>
            
            <div class="slider-box">
                <label>空の明るさ調整</label>
                <input type="range" id="thresholdSlider" min="0" max="255" value="180">
                
                <div class="score-box">
                    <div>
                        <div>林冠被覆率</div>
                        <div class="main-score" id="treeRatio">-%</div>
                    </div>
                    <div>
                        <div>空隙率</div>
                        <div class="sub-score" id="skyRatio">-%</div>
                    </div>
                </div>
                <p style="font-size:0.8rem; color:red; margin-top:10px;">※赤い部分を「空」とみなしています</p>

                <div class="gps-section">
                    <button class="gps-btn" onclick="getLocation()">
                        📍 緯度経度を取得
                    </button>
                    <div id="gpsResult" class="gps-result"></div>
                </div>
            </div>
        </div>
    </div>


<script>
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js');
    }

    // --- UI要素 ---
    const startScreen = document.getElementById('startScreen');
    const cameraContainer = document.getElementById('cameraContainer');
    const controlsArea = document.getElementById('controlsArea');
    const resultLayer = document.getElementById('resultLayer');
    const fileInput = document.getElementById('fileInput');

    const video = document.getElementById('video');
    const bubble = document.getElementById('bubble');
    const targetCircle = document.getElementById('targetCircle');
    const sensorBtn = document.getElementById('sensorBtn');
    const shutterBtn = document.getElementById('shutterBtn');

    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const slider = document.getElementById('thresholdSlider');
    const treeRatioDisplay = document.getElementById('treeRatio');
    const skyRatioDisplay = document.getElementById('skyRatio');

    // GPS表示用
    const gpsResult = document.getElementById('gpsResult');

    let originalImageData = null;
    let currentStream = null;
    let isCameraRunning = false;

    // --- モード切替 ---

    // 1. カメラモード開始
    async function startCameraMode() {
        startScreen.style.display = 'none';
        cameraContainer.style.display = 'flex';
        controlsArea.style.display = 'flex';
        
        try {
            // ★改良点: アスペクト比1（正方形）を優先的に要求
            const constraints = {
                video: {
                    facingMode: 'environment',
                    aspectRatio: 1, // 正方形を要求
                    width: { ideal: 1920 },
                    height: { ideal: 1920 }
                },
                audio: false
            };
            currentStream = await navigator.mediaDevices.getUserMedia(constraints);
            video.srcObject = currentStream;
            isCameraRunning = true;
            
            // センサー初期化
            checkSensorPermission();
        } catch (err) {
            alert("カメラを起動できませんでした");
            goHome();
        }
    }

    // 2. ファイルモード開始
    function startFileMode() {
        fileInput.click();
    }

    // ファイル選択時の処理
    fileInput.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = (event) => {
            const img = new Image();
            img.onload = () => {
                startScreen.style.display = 'none';
                showResult(img);
            };
            img.src = event.target.result;
        };
        reader.readAsDataURL(file);
    });

    // 3. ホームに戻る（リセット）
    function goHome() {
        // カメラ停止
        if (currentStream) {
            currentStream.getTracks().forEach(track => track.stop());
            currentStream = null;
        }
        isCameraRunning = false;

        // UIリセット
        cameraContainer.style.display = 'none';
        controlsArea.style.display = 'none';
        resultLayer.style.display = 'none';
        startScreen.style.display = 'flex';
        
        // ファイル入力リセット
        fileInput.value = '';
        
        // GPS表示リセット
        gpsResult.style.display = 'none';
        gpsResult.textContent = '';
    }


    // --- 水準器ロジック ---
    
    function checkSensorPermission() {
        if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
            sensorBtn.style.display = 'block';
        } else {
            window.addEventListener('deviceorientation', handleOrientation);
        }
    }

    function requestSensorPermission() {
        DeviceOrientationEvent.requestPermission().then(response => {
            if (response === 'granted') {
                sensorBtn.style.display = 'none';
                window.addEventListener('deviceorientation', handleOrientation);
            }
        });
    }

    function handleOrientation(event) {
        if (!isCameraRunning) return;

        let x = event.gamma; // 左右
        let y = event.beta;  // 前後

        if (Math.abs(y) > 90) {
            if (y > 0) { y = 180 - y; } else { y = -180 - y; }
        }
        
        let moveX = x * 1.5;
        let moveY = y * 1.5;

        const maxDist = 80;
        const dist = Math.sqrt(moveX*moveX + moveY*moveY);
        if (dist > maxDist) {
            moveX = (moveX / dist) * maxDist;
            moveY = (moveY / dist) * maxDist;
        }

        bubble.style.transform = `translate(calc(-50% + ${moveX}px), calc(-50% + ${moveY}px))`;

        const threshold = 10;
        if (Math.abs(x) < threshold && Math.abs(y) < threshold) {
            targetCircle.classList.add('ok');
        } else {
            targetCircle.classList.remove('ok');
        }
    }


    // --- 解析ロジック ---

    // シャッターボタン
    shutterBtn.addEventListener('click', () => {
        // ★改良点: ビデオ映像を正方形にクロップしてキャプチャ
        const w = video.videoWidth;
        const h = video.videoHeight;
        
        // 短い方の辺に合わせて正方形サイズを決定
        const size = Math.min(w, h);
        const startX = (w - size) / 2;
        const startY = (h - size) / 2;
        
        // 作業用キャンバスで画像化（正方形）
        const tempCanvas = document.createElement('canvas');
        tempCanvas.width = size;
        tempCanvas.height = size;
        const tempCtx = tempCanvas.getContext('2d');
        
        // drawImage(image, sx, sy, sWidth, sHeight, dx, dy, dWidth, dHeight)
        tempCtx.drawImage(video, startX, startY, size, size, 0, 0, size, size);
        
        // Imageオブジェクト化して共通処理へ
        const img = new Image();
        img.onload = () => showResult(img);
        img.src = tempCanvas.toDataURL('image/jpeg');
    });

    // 解析と表示（共通関数）
    function showResult(img) {
        resultLayer.style.display = 'flex';
        
        // リサイズ計算
        const MAX_SIZE = 800;
        let drawW = img.width;
        let drawH = img.height;
        if (drawW > drawH) {
            if (drawW > MAX_SIZE) { drawH = drawH * (MAX_SIZE/drawW); drawW = MAX_SIZE; }
        } else {
            if (drawH > MAX_SIZE) { drawW = drawW * (MAX_SIZE/drawH); drawH = MAX_SIZE; }
        }

        canvas.width = drawW;
        canvas.height = drawH;
        ctx.drawImage(img, 0, 0, drawW, drawH);
        
        originalImageData = ctx.getImageData(0, 0, drawW, drawH);
        
        // 初期計算
        processImage();
    }

    slider.addEventListener('input', processImage);

    function processImage() {
        if (!originalImageData) return;

        const threshold = parseInt(slider.value);
        const w = canvas.width;
        const h = canvas.height;
        
        const src = originalImageData.data;
        const output = ctx.createImageData(w, h);
        const dst = output.data;

        let skyCount = 0;
        const totalPixels = w * h;

        for (let i = 0; i < src.length; i += 4) {
            const r = src[i];
            const g = src[i+1];
            const b = src[i+2];
            
            const lum = 0.299*r + 0.587*g + 0.114*b;

            if (lum > threshold) {
                skyCount++;
                dst[i] = 255; dst[i+1] = 0; dst[i+2] = 0; dst[i+3] = 255;
            } else {
                dst[i] = r; dst[i+1] = g; dst[i+2] = b; dst[i+3] = 255;
            }
        }
        
        ctx.putImageData(output, 0, 0);

        const skyRate = (skyCount / totalPixels) * 100;
        treeRatioDisplay.textContent = (100 - skyRate).toFixed(1) + '%';
        skyRatioDisplay.textContent = skyRate.toFixed(1) + '%';
    }

    // 緯度経度取得処理
    function getLocation() {
        gpsResult.style.display = 'block';
        gpsResult.innerHTML = "📡 取得中...";

        if (!navigator.geolocation) {
            gpsResult.textContent = "お使いのブラウザでは位置情報が利用できません";
            return;
        }

        navigator.geolocation.getCurrentPosition(
            (position) => {
                const lat = position.coords.latitude.toFixed(6);
                const lng = position.coords.longitude.toFixed(6);
                gpsResult.innerHTML = `緯度: ${lat}<br>経度: ${lng}`;
            },
            (error) => {
                let errorMsg = "位置情報の取得に失敗しました";
                switch(error.code) {
                    case 1: errorMsg = "位置情報の利用が許可されていません"; break;
                    case 2: errorMsg = "位置情報が利用できません"; break;
                    case 3: errorMsg = "タイムアウトしました"; break;
                }
                gpsResult.textContent = errorMsg;
            },
            {
                enableHighAccuracy: true,
                timeout: 10000,
                maximumAge: 0
            }
        );
    }

</script>
</body>
</html>
